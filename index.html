<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Tiny5&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <p id="hint">Расставляйте флажки, находите мины и не дайте Сапёрику вас запутать — он может случайно украсть флажок в любой момент.</p>
  <div id="app">
    <div id="difficulty-selector">
      <button class="diff-btn active" data-level="easy">Easy</button>
      <button class="diff-btn" data-level="medium">Medium</button>
      <button class="diff-btn" data-level="hard">Hard</button>
      <button class="diff-btn" data-level="expert">Expert</button>
    </div>
    <div id="game-container">
      <div id="sidebar">
        <div id="mine-counter">💣 <span id="mines-left">10</span></div>
        <div id="timer">⏱ <span id="time">02:00</span></div>
        <button id="new-game-btn">NEW GAME</button>
        <div id="message"></div>
      </div>
      <div id="board-wrapper">
        <div id="kostya-container">
          <div id="speech-bubble" class="hidden">Византично!</div>
          <img id="kostya-img" src="pixel_character_stomp_v2.gif" alt="Kostya">
        </div>
        <div id="board"></div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
